#textdomain wesnoth-Forge_Garde
# Test unitaire déterministe du hook Forge-Garde.
#  - Partie 1 : un construct détruit laisse une Carcasse (GG Wreck).
#  - Partie 2 : une Carcasse + un Ingénieur adjacent -> reconstruction de l'automate.
# Lancer : wesnoth -u test_fg_salvage   (exit 0 = PASS)
[test]
    id=test_fg_salvage
    name="Forge-Garde : test Recuperation"
    turns=10
    {DEFAULT_SCHEDULE}
    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg"

    {FG_SALVAGE_EVENTS}

    [side]
        side=1
        controller=ai
        team_name=red
        type=GG Forge Thane
        x=1
        y=1
        canrecruit=yes
        gold=100
    [/side]
    [side]
        side=2
        controller=ai
        team_name=blue
        type=GG Forge Thane
        x=7
        y=5
        canrecruit=yes
        gold=100
    [/side]

    [event]
        name=prestart
        # Partie 1 : un Cuirassé qu'on va détruire.
        [unit]
            type=GG Ironclad
            id=testclad
            side=1
            x=4
            y=3
        [/unit]
        # Partie 2 : une carcasse pré-placée + un Ingénieur adjacent (positions fixes).
        [unit]
            type=GG Wreck
            side=1
            x=3
            y=2
            [variables]
                fg_original_type=GG Ironclad
            [/variables]
        [/unit]
        [unit]
            type=GG Gearwright
            side=1
            x=3
            y=3
        [/unit]
    [/event]

    [event]
        name=start
        # --- Partie 1 : mort -> carcasse ---
        [harm_unit]
            [filter]
                id=testclad
            [/filter]
            amount=9999
            kill=yes
            fire_event=yes
            animate=no
        [/harm_unit]
        [if]
            [have_unit]
                type=GG Wreck
                side=1
                count=2
            [/have_unit]
            [then]
                [wml_message]
                    logger=err
                    message="TEST partie 1 OK : la mort a laisse une carcasse (2 carcasses au total)"
                [/wml_message]
            [/then]
            [else]
                [wml_message]
                    logger=err
                    message="TEST partie 1 FAIL : pas de carcasse de mort"
                [/wml_message]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/else]
        [/if]

        # --- Partie 2 : reconstruction de la carcasse pre-placee en (3,2) par l'ingenieur en (3,3) ---
        [set_variable]
            name=side_number
            value=1
        [/set_variable]
        [fire_event]
            name=fg_reclaim
        [/fire_event]

        # Le Cuirassé doit être reconstruit en (3,2).
        [if]
            [have_unit]
                type=GG Ironclad
                side=1
                x=3
                y=2
            [/have_unit]
            [then]
                [wml_message]
                    logger=err
                    message="TEST partie 2 OK : Cuirasse reconstruit en 3,2 -> PASS"
                [/wml_message]
                [endlevel]
                    result=victory
                [/endlevel]
            [/then]
            [else]
                [wml_message]
                    logger=err
                    message="TEST partie 2 FAIL : pas de Cuirasse reconstruit en 3,2"
                [/wml_message]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/else]
        [/if]
    [/event]
[/test]
