#textdomain wesnoth-Forge_Garde
# Galerie Forge-Garde : place les 18 unites sur la carte pour inspection visuelle.
# Lancer directement (sans menu) :
#   wesnoth -t fg_showcase --data-dir <racine_wesnoth>
# Colonne gauche = niveau 1, colonne droite = evolution (N2/N3). Survolez ou
# clic-droit > Description pour voir sprite + stats. Ne finissez pas le tour.

# Place une unite ET pose une etiquette avec son nom traduit.
# TYPE peut contenir des espaces -> l'entourer de parentheses a l'appel.
#define FG_GALLERY_UNIT TYPE X Y
    [unit]
        type={TYPE}
        side=1
        x={X}
        y={Y}
        animate=no
    [/unit]
    [store_unit]
        [filter]
            x={X}
            y={Y}
        [/filter]
        variable=gallery_u
    [/store_unit]
    [label]
        x={X}
        y={Y}
        text=$gallery_u.name
    [/label]
    [clear_variable]
        name=gallery_u
    [/clear_variable]
#enddef

[test]
    id=fg_showcase
    name= _ "Forge-Garde — Galerie des unités"
    turns=-1
    victory_when_enemies_defeated=no

    # Lumiere neutre : pas d'assombrissement, les sprites s'affichent tels quels.
    [time]
        id=neutre
        name= _ "Neutre"
        lawful_bonus=0
        red=0
        green=0
        blue=0
    [/time]

    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg"

    [side]
        side=1
        controller=human
        team_name=joueur
        # Le meneur de la galerie : Thane de Forge (slot N2, ligne 9).
        type=GG Forge Thane
        id=showcase_leader
        x=2
        y=9
        canrecruit=yes
        gold=0
        fog=no
        shroud=no
    [/side]
    [side]
        side=2
        controller=null
        team_name=spectateur
        gold=0
    [/side]

    [event]
        name=prestart

        # ---- Colonne gauche : niveau 1 ----
        {FG_GALLERY_UNIT (GG Gearwright)       2 1}
        {FG_GALLERY_UNIT (GG Ironclad)         2 2}
        {FG_GALLERY_UNIT (GG Steam Crawler)    2 3}
        {FG_GALLERY_UNIT (GG Thundersmith)     2 4}
        {FG_GALLERY_UNIT (GG Forgemortar)      2 5}
        {FG_GALLERY_UNIT (GG Runesmith)        2 6}
        {FG_GALLERY_UNIT (GG Rune Sentinel)    2 7}
        {FG_GALLERY_UNIT (GG Spellbreaker)     2 8}
        # (2,9) = meneur Thane de Forge, deja place par [side] -> etiquette ci-dessous.

        # ---- Colonne droite : evolutions (N2 / N3) ----
        {FG_GALLERY_UNIT (GG Master Engineer)  5 1}
        {FG_GALLERY_UNIT (GG Heavy Ironclad)   5 2}
        {FG_GALLERY_UNIT (GG Steam Juggernaut) 5 3}
        {FG_GALLERY_UNIT (GG Thunderguard)     5 4}
        {FG_GALLERY_UNIT (GG Siege Mortar)     5 5}
        {FG_GALLERY_UNIT (GG Rune Warden)      5 6}
        {FG_GALLERY_UNIT (GG Rune Colossus)    5 7}
        {FG_GALLERY_UNIT (GG Runeward)         5 8}
        {FG_GALLERY_UNIT (GG Runelord)         5 9}

        # Etiquette du meneur (place par [side], pas par le macro).
        [label]
            x=2
            y=9
            text= _ "Thane de Forge"
        [/label]

        [print]
            text= _ "Galerie Forge-Garde — survolez une unité ou clic-droit > Description. Ne finissez pas le tour."
            size=16
            duration=900
        [/print]
    [/event]
[/test]
