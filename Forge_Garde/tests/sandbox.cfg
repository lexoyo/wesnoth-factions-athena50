#textdomain wesnoth-Forge_Garde
# Bac a sable jouable Forge-Garde : toutes les unites cote joueur (deplacables,
# attaques possibles), un camp ennemi varie a affronter, terrain varie, et le
# hook Recuperation (carcasses) actif.
# Lancer directement (sans menu) :
#   wesnoth -t fg_sandbox --data-dir <racine_wesnoth>
# - Deplace / attaque librement tes unites (ne finis pas le tour si tu veux juste tester).
# - Finis le tour pour declencher l'IA ennemie (vrai combat).
# - Le meneur (Thane de Forge) est sur le donjon : tu peux aussi RECRUTER n'importe
#   quelle unite Forge-Garde (or de depart genereux).

# Place une unite cote joueur. TYPE a espaces -> entre parentheses a l'appel.
#define FG_PLACE TYPE X Y
    [unit]
        type={TYPE}
        side=1
        x={X}
        y={Y}
    [/unit]
#enddef

# Place une unite sur le camp indique.
#define FG_PLACE_SIDE TYPE X Y SIDE
    [unit]
        type={TYPE}
        side={SIDE}
        x={X}
        y={Y}
    [/unit]
#enddef

[test]
    id=fg_sandbox
    name= _ "Forge-Garde — Bac à sable jouable"
    turns=-1

    # Lumiere neutre : pas de penalite jour/nuit pendant les tests.
    [time]
        id=neutre
        name= _ "Neutre"
        lawful_bonus=0
        red=0
        green=0
        blue=0
    [/time]

    # Hook signature : mort d'un construct -> Carcasse, ingenieur adjacent -> reconstruction.
    {FG_SALVAGE_EVENTS}

    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg, Gg^Ft, Hh, Mm, Mm, Hh, Gg^Ft, Gg, Gg, Gg, Gg, Gg
Gg, Ch, Ch, Gg, Gg, Gg^Ft, Hh, Mm, Hh, Gg, Gg, Ds, Ds, Ch, Ch, Gg
Gg, Ch, Gg, Gg, Gg, Gg^Ft, Hh, Ww, Ww, Gg, Gg^Vh, Ds, Gg, Gg, Ch, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg^Ft, Ww, Ww, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, 1 Kh, Ch, Gg, Gg, Gg, Gg^Ft, Ww, Ww, Gg, Ss, Gg, Gg, Ch, 2 Kh, Gg
Gg, Ch, Ch, Gg, Gg^Vh, Gg, Gg, Ww, Ww, Gg, Ss, Gg, Gg^Vh, Ch, Ch, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Ww, Ww, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Hh, Gg, Gg, Gg^Ft, Gg^Ft, Ww, Gg, Gg, Hh, Gg, Gg, Gg, Gg, Gg
Gg, Hh, Hh, Mm, Gg, Gg, Hh, Hh, Mm, Mm, Hh, Gg, Aa, Aa, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Hh, Mm, Gg, Gg, Aa, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg"

    [side]
        side=1
        controller=human
        team_name=joueur
        user_team_name= _ "Forge-Garde"
        type=GG Forge Thane
        id=fg_player_leader
        x=2
        y=5
        canrecruit=yes
        gold=400
        fog=no
        shroud=no
        recruit="GG Gearwright,GG Master Engineer,GG Ironclad,GG Heavy Ironclad,GG Steam Crawler,GG Steam Juggernaut,GG Thundersmith,GG Thunderguard,GG Forgemortar,GG Siege Mortar,GG Runesmith,GG Rune Warden,GG Rune Sentinel,GG Rune Colossus,GG Spellbreaker,GG Runeward"
    [/side]

    [side]
        side=2
        controller=ai
        team_name=ennemi
        user_team_name= _ "Cibles d'entraînement"
        type=Orcish Warlord
        id=enemy_leader
        x=15
        y=5
        canrecruit=yes
        gold=200
        fog=no
        shroud=no
    [/side]

    [event]
        name=prestart

        # ---------- Cote joueur : toutes les unites Forge-Garde ----------
        {FG_PLACE (GG Rune Sentinel)    1 1}
        {FG_PLACE (GG Rune Colossus)    2 1}
        {FG_PLACE (GG Forgemortar)      3 1}
        {FG_PLACE (GG Siege Mortar)     4 1}
        {FG_PLACE (GG Steam Juggernaut) 5 1}
        {FG_PLACE (GG Steam Crawler)    1 2}
        {FG_PLACE (GG Ironclad)         4 2}
        {FG_PLACE (GG Heavy Ironclad)   5 2}
        {FG_PLACE (GG Runesmith)        1 3}
        {FG_PLACE (GG Rune Warden)      3 3}
        {FG_PLACE (GG Gearwright)       1 4}
        {FG_PLACE (GG Thundersmith)     4 4}
        {FG_PLACE (GG Master Engineer)  1 5}
        {FG_PLACE (GG Thunderguard)     4 5}
        {FG_PLACE (GG Runelord)         5 5}
        {FG_PLACE (GG Spellbreaker)     1 6}
        {FG_PLACE (GG Runeward)         4 6}
        # (2,5) = meneur Thane de Forge, place par [side].

        # ---------- Cote ennemi : cibles variees (races differentes) ----------
        {FG_PLACE_SIDE (Orcish Grunt)        12 4 2}
        {FG_PLACE_SIDE (Orcish Grunt)        13 4 2}
        {FG_PLACE_SIDE (Skeleton)            11 5 2}
        {FG_PLACE_SIDE (Elvish Archer)       13 6 2}
        {FG_PLACE_SIDE (Wose)                10 7 2}
        {FG_PLACE_SIDE (Mage)                13 7 2}
        {FG_PLACE_SIDE (Heavy Infantryman)   12 6 2}
        {FG_PLACE_SIDE (Troll Whelp)         12 3 2}

        [print]
            text= _ "Bac à sable Forge-Garde : déplace/attaque librement. Finis le tour pour activer l'IA ennemie. Recrute depuis le donjon."
            size=15
            duration=900
        [/print]
    [/event]
[/test]
