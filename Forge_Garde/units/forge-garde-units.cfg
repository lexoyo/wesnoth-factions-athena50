#textdomain wesnoth-Forge_Garde
# Faction Forge-Garde — v1 : 8 lignes de recrue (N1->N2) + meneur (N2->N3).
# Sprites = PLACEHOLDERS réutilisant des images du core (art custom = itération suivante).
# Nains = race=dwarf (vivants, traits, dépendent des villages).
# Constructs = race=mechanical (immunisés poison/drain/peste, auto-réparation par régénération).

#                       ============ 1. INGÉNIEUR (répare) ============
[unit_type]
    id=GG Gearwright
    name= _ "Forgeron-Mécano"
    race=dwarf
    image="units/forge-garde/gearwright.png"
    {FG_ANIMS units/forge-garde/gearwright.png mace.ogg lightning.ogg}
    hitpoints=32
    movement_type=gg_dwarf
    movement=4
    experience=37
    level=1
    alignment=neutral
    advances_to=GG Master Engineer
    cost=21
    usage=healer
    description= _ "Le Forgeron-Mécano entretient les automates de la Forge-Garde. Sa clé runique répare les constructs alliés — mais ne soigne pas la chair vivante."
    [abilities]
        {ABILITY_REPAIR 4}
    [/abilities]
    [attack]
        name=wrench
        description= _ "clé runique"
        type=impact
        range=melee
        damage=6
        number=3
    [/attack]
[/unit_type]

[unit_type]
    id=GG Master Engineer
    name= _ "Maître-Ingénieur"
    race=dwarf
    image="units/forge-garde/master-engineer.png"
    {FG_ANIMS units/forge-garde/master-engineer.png mace.ogg lightning.ogg}
    hitpoints=44
    movement_type=gg_dwarf
    movement=4
    experience=120
    level=2
    alignment=neutral
    advances_to=null
    cost=38
    usage=healer
    description= _ "Atelier mobile : il répare lourdement les constructs et porte secours à ses frères de chair."
    [abilities]
        {ABILITY_REPAIR 8}
        {ABILITY_HEALS}
    [/abilities]
    [attack]
        name=wrench
        description= _ "clé runique"
        type=impact
        range=melee
        damage=8
        number=3
    [/attack]
[/unit_type]

