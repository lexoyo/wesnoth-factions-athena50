#textdomain wesnoth-Forge_Garde
# Animations Forge-Garde "option 1" : tout est derive de l'UNIQUE sprite de chaque
# unite (pas de frames dessinees). On obtient mouvement + impact via :
#  - deplacement interpole (offset) pour le bond de melee,
#  - teinte (~CS) pour le flash d'impact / le recul,
#  - projectile mainline (FIRE_BURST_SMALL) pour les attaques a distance,
#  - pulsation lumineuse en idle (hum runique).
# Appliquer a une unite : {FG_ANIMS <chemin_image> <son_melee> <son_distance>}

# --- briques internes ---

# Coup de melee facon "chop" depuis l'image unique : arme en arriere (rotation -),
# puis frappe inclinee vers l'avant (rotation +) avec bond + flash + son, puis retour.
# Le corps entier s'incline (faute de calque arme separe) mais combine au bond ca lit
# comme un coup de hache/marteau. Pour un VRAI arc d'arme -> rigging (option 3).
#define FG_MELEE_LUNGE IMG SOUND
    [attack_anim]
        [filter_attack]
            range=melee
        [/filter_attack]
        start_time=-300
        [frame]
            # Arme : leger recul / inclinaison arriere.
            image="{IMG}~ROTATE(-8)"
            duration=150
            offset="0.0~-0.06"
        [/frame]
        [frame]
            # Frappe : bond en avant + inclinaison avant + flash d'impact + son.
            image="{IMG}~ROTATE(12)~CS(45,45,35)"
            duration=120
            offset="-0.06~0.4"
            sound={SOUND}
        [/frame]
        [frame]
            # Suivi du geste.
            image="{IMG}~ROTATE(7)"
            duration=120
            offset=0.4
        [/frame]
        [frame]
            # Retour a la position de garde.
            image="{IMG}"
            duration=200
            offset="0.4~0.0"
        [/frame]
    [/attack_anim]
#enddef

# Tir immobile + eclat (projectile) vers la cible (distance).
#define FG_RANGED_BURST IMG SOUND
    [attack_anim]
        [filter_attack]
            range=ranged
        [/filter_attack]
        {FIRE_BURST_SMALL}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(60,50,25)"
            duration=150
            sound={SOUND}
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# Variante a distance avec l'ECLAIR du jeu (foudre runique) au lieu du feu.
#define FG_RANGED_LIGHTNING IMG SOUND
    [attack_anim]
        [filter_attack]
            range=ranged
        [/filter_attack]
        {LIGHTNING_BOLT 1}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(35,35,75)"
            duration=150
            sound={SOUND}
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# Recul / flinch quand l'unite est touchee.
#define FG_DEFEND IMG
    [defend]
        start_time=-100
        [if]
            hits=yes
            [frame]
                image="{IMG}~CS(-40,-40,-40)"
                duration=250
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                image="{IMG}"
                duration=200
            [/frame]
        [/else]
    [/defend]
#enddef

# Pulsation lumineuse occasionnelle (hum d'energie runique).
#define FG_IDLE_PULSE IMG
    [idle_anim]
        {STANDARD_IDLE_FILTER}
        start_time=0
        [frame]
            image="{IMG}"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(15,15,30)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(28,28,55)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(15,15,30)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}"
            duration=300
        [/frame]
    [/idle_anim]
#enddef

# --- bundle a coller dans un [unit_type] ---
# Les unites sans attaque a distance ignorent simplement FG_RANGED_BURST (filtre non satisfait).
#define FG_ANIMS IMG MELEE_SOUND RANGED_SOUND
    {FG_MELEE_LUNGE {IMG} {MELEE_SOUND}}
    {FG_RANGED_BURST {IMG} {RANGED_SOUND}}
    {FG_DEFEND {IMG}}
    {FG_IDLE_PULSE {IMG}}
#enddef

# Comme FG_ANIMS mais l'attaque a distance est un ECLAIR (unites a foudre runique).
#define FG_ANIMS_LIGHTNING IMG MELEE_SOUND RANGED_SOUND
    {FG_MELEE_LUNGE {IMG} {MELEE_SOUND}}
    {FG_RANGED_LIGHTNING {IMG} {RANGED_SOUND}}
    {FG_DEFEND {IMG}}
    {FG_IDLE_PULSE {IMG}}
#enddef
