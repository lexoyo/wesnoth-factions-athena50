#textdomain wesnoth-Forge_Garde
# ============================================================================
#  HOOK SIGNATURE FORGE-GARDE : « La Légion ne meurt pas — on la reconstruit »
#  - Récupération : un construct détruit laisse une Carcasse (GG Wreck).
#  - Reconstruction : au début de ton tour, toute Carcasse adjacente à un de
#    tes Ingénieurs est rebâtie en son automate d'origine (coûte 12 or ; l'unité
#    reconstruite ne peut ni bouger ni attaquer ce tour-là).
#  - Surpression : la ligne à VAPEUR n'a pas de carcasse — elle EXPLOSE à la
#    mort (dégâts de feu de zone aux ennemis adjacents). Sacrifice agressif.
#
#  100 % WML natif (events). À inclure dans chaque [era] et dans le [test].
# ============================================================================

#define FG_SALVAGE_EVENTS
    # --- 1) Construct (hors vapeur) détruit -> laisse une Carcasse ---
    [event]
        name=die
        first_time_only=no
        [filter]
            race=mechanical
            [not]
                type=GG Wreck,GG Steam Crawler,GG Steam Juggernaut
            [/not]
        [/filter]
        [unit]
            type=GG Wreck
            side=$unit.side
            x=$unit.x
            y=$unit.y
            [variables]
                fg_original_type=$unit.type
            [/variables]
        [/unit]
        [wml_message]
            logger=info
            message="FG_SALVAGE wreck spawned from $unit.type at $unit.x,$unit.y side $unit.side"
        [/wml_message]
    [/event]

    # --- 2) Surpression : la vapeur explose à la mort (pas de carcasse) ---
    [event]
        name=die
        first_time_only=no
        [filter]
            type=GG Steam Crawler,GG Steam Juggernaut
        [/filter]
        [harm_unit]
            [filter]
                [filter_location]
                    x=$unit.x
                    y=$unit.y
                    radius=1
                [/filter_location]
                [not]
                    x=$unit.x
                    y=$unit.y
                [/not]
                [filter_side]
                    [enemy_of]
                        side=$unit.side
                    [/enemy_of]
                [/filter_side]
            [/filter]
            amount=12
            damage_type=fire
            kill=yes
            animate=yes
            fire_event=yes
        [/harm_unit]
        [wml_message]
            logger=info
            message="FG_SALVAGE overpressure explosion from $unit.type at $unit.x,$unit.y"
        [/wml_message]
    [/event]

    # --- 3) Logique de reconstruction (lit $side_number) ---
    [event]
        name=fg_reclaim
        first_time_only=no
        [store_unit]
            [filter]
                type=GG Wreck
                side=$side_number
            [/filter]
            variable=fg_wrecks
            kill=no
        [/store_unit]
        [foreach]
            array=fg_wrecks
            [do]
                [store_unit]
                    [filter]
                        side=$side_number
                        type=GG Gearwright,GG Master Engineer
                        [filter_location]
                            [filter_adjacent_location]
                                x=$this_item.x
                                y=$this_item.y
                            [/filter_adjacent_location]
                        [/filter_location]
                    [/filter]
                    variable=fg_eng
                    kill=no
                [/store_unit]
                [store_gold]
                    side=$side_number
                    variable=fg_gold
                [/store_gold]
                [if]
                    [variable]
                        name=fg_eng.length
                        greater_than=0
                    [/variable]
                    [variable]
                        name=fg_gold
                        greater_than_equal_to=12
                    [/variable]
                    [then]
                        [gold]
                            side=$side_number
                            amount=-12
                        [/gold]
                        [kill]
                            x=$this_item.x
                            y=$this_item.y
                            type=GG Wreck
                            animate=no
                            fire_event=no
                        [/kill]
                        [unit]
                            type=$this_item.variables.fg_original_type
                            side=$side_number
                            x=$this_item.x
                            y=$this_item.y
                            moves=0
                            attacks_left=0
                        [/unit]
                        [wml_message]
                            logger=info
                            message="FG_SALVAGE rebuilt $this_item.variables.fg_original_type at $this_item.x,$this_item.y side $side_number"
                        [/wml_message]
                    [/then]
                [/if]
                [clear_variable]
                    name=fg_eng,fg_gold
                [/clear_variable]
            [/do]
        [/foreach]
        [clear_variable]
            name=fg_wrecks
        [/clear_variable]
    [/event]

    # --- 4) Déclencheur : au début de chaque tour, tenter la reconstruction ---
    [event]
        name=side turn
        first_time_only=no
        [fire_event]
            name=fg_reclaim
        [/fire_event]
    [/event]
#enddef
