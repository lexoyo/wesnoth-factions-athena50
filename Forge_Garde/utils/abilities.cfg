#textdomain wesnoth-Forge_Garde
# Capacités custom de la faction Forge-Garde.
# Définies en macros, incluses AVANT [units] dans _main.cfg.

# Répare : soigne UNIQUEMENT les unités mécaniques alliées adjacentes.
# Implémenté via [heals] + [affect_adjacent][filter]race=mechanical.
#define ABILITY_REPAIR VALUE
    [heals]
        value={VALUE}
        id=gg_repair
        unique_id=gg_repair_{VALUE}
        affect_allies=yes
        affect_self=no
        poison=slowed
        name= _ "répare +{VALUE}"
        female_name= _ "répare +{VALUE}"
        description= _ "Cette unité répare les unités mécaniques alliées adjacentes (jusqu’à {VALUE} PV par tour). Elle ne peut pas soigner les unités vivantes."
        [affect_adjacent]
            [filter]
                race=mechanical
            [/filter]
        [/affect_adjacent]
    [/heals]
#enddef

# Protection runique : aura anti-magie.
# Soi-même + alliés adjacents gagnent +20 % de résistance au feu et à l'arcane.
#define ABILITY_RUNIC_WARD
    [resistance]
        id=gg_runic_ward
        add=20
        apply_to=fire,arcane
        affect_self=yes
        affect_allies=yes
        name= _ "protection runique"
        female_name= _ "protection runique"
        description= _ "Les runes de garde de cette unité la protègent, elle et les unités alliées adjacentes : +20 % de résistance au feu et à l’arcane."
        [affect_adjacent]
        [/affect_adjacent]
    [/resistance]
#enddef
