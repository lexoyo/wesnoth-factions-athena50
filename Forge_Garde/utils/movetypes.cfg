#textdomain wesnoth-Forge_Garde
# Types de déplacement de la faction Forge-Garde.
# Rappel moteur : [resistance] 100 = normal, <100 = résistant, >100 = vulnérable.
#                 [defense] = % de chances d'ÊTRE TOUCHÉ (plus bas = meilleure défense).
# Ces blocs sont inclus DANS [units] (voir _main.cfg).

# --- Nain vivant : bon en caverne/collines/montagnes, vulnérable à l'arcane ---
[movetype]
    name=gg_dwarf
    flies=no
    [movement_costs]
        flat=1
        sand=2
        forest=3
        hills=2
        mountains=3
        village=1
        castle=1
        cave=2
        swamp_water=3
        shallow_water=3
        reef=2
        frozen=3
        fungus=2
    [/movement_costs]
    [defense]
        flat=60
        sand=60
        forest=60
        hills=40
        mountains=40
        village=50
        castle=40
        cave=40
        swamp_water=70
        shallow_water=70
        reef=60
        frozen=60
        fungus=60
    [/defense]
    [resistance]
        blade=80
        pierce=80
        impact=100
        fire=100
        cold=90
        arcane=110
    [/resistance]
[/movetype]

# --- Construct mécanique : lent, blindé, anti-magie, troué par contondant/feu ---
[movetype]
    name=gg_construct
    flies=no
    [movement_costs]
        flat=2
        sand=3
        forest=3
        hills=3
        mountains=4
        village=1
        castle=1
        cave=2
        swamp_water=4
        shallow_water=4
        reef=3
        frozen=4
        fungus=3
    [/movement_costs]
    [defense]
        flat=50
        sand=60
        forest=60
        hills=50
        mountains=50
        village=50
        castle=40
        cave=40
        swamp_water=70
        shallow_water=70
        reef=60
        frozen=60
        fungus=60
    [/defense]
    [resistance]
        blade=60
        pierce=60
        impact=110
        fire=120
        cold=80
        arcane=80
    [/resistance]
[/movetype]
