#textdomain wesnoth-Forge_Garde

# Ère 1 : Forge-Garde seule (miroir) — pratique pour tester/équilibrer la faction.
[era]
    id=era_forge_garde_solo
    name= _ "Forge-Garde (solo)"
    description= _ "Ère de test ne contenant que la faction naine mécanique Forge-Garde."
    {~add-ons/Forge_Garde/factions/forge-garde.cfg}
    {FG_SALVAGE_EVENTS}
[/era]

# Ère 2 : les factions classiques + Forge-Garde — pour jouer la faction contre les autres.
[era]
    id=era_forge_garde
    name= _ "Défaut + Forge-Garde"
    description= _ "L’ère par défaut de Wesnoth, augmentée de la faction naine mécanique Forge-Garde."
    {ERA_DEFAULT}
    {~add-ons/Forge_Garde/factions/forge-garde.cfg}
    {FG_SALVAGE_EVENTS}
[/era]
