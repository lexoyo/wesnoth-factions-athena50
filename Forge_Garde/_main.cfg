#textdomain wesnoth-Forge_Garde
# Add-on Forge-Garde — point d'entrée.

[textdomain]
    name="wesnoth-Forge_Garde"
[/textdomain]

[binary_path]
    path=data/add-ons/Forge_Garde
[/binary_path]

# 1) Définitions de macros (capacités custom + hook Récupération + animations) — AVANT usage.
{~add-ons/Forge_Garde/utils/abilities.cfg}
{~add-ons/Forge_Garde/utils/salvage.cfg}
{~add-ons/Forge_Garde/utils/animations.cfg}

# 2) Types de déplacement + unités. Chargés toujours (nécessaire pour le mode test -u).
[units]
    {~add-ons/Forge_Garde/utils/movetypes.cfg}
    {~add-ons/Forge_Garde/units/}
[/units]

# 3) Ères (multijoueur uniquement).
#ifdef MULTIPLAYER
{~add-ons/Forge_Garde/eras.cfg}
#endif

# 4) Scénarios de test (mode -u et -t) : test unitaire + galerie d'unités.
{~add-ons/Forge_Garde/tests/}
