#textdomain wesnoth-Haute_Lignee_Arcane
# Scénarios de test.
#  - test_hal_load : validation headless du chargement   ->  wesnoth -u test_hal_load  (exit 0 = OK)
#  - hal_showcase  : galerie visuelle de toutes les unités ->  wesnoth -t hal_showcase

# Place une unité côté joueur + étiquette son nom traduit.
#define HAL_SHOW TYPE X Y
    [unit]
        type={TYPE}
        side=1
        x={X}
        y={Y}
        animate=no
    [/unit]
    [store_unit]
        [filter]
            x={X}
            y={Y}
        [/filter]
        variable=hal_lbl
    [/store_unit]
    [label]
        x={X}
        y={Y}
        text=$hal_lbl.name
    [/label]
    [clear_variable]
        name=hal_lbl
    [/clear_variable]
#enddef

# ---------------------------------------------------------------------------
# Validation headless : le scénario se charge, instancie le meneur, et gagne.
[test]
    id=test_hal_load
    name="HAL : test de chargement"
    turns=4
    {DEFAULT_SCHEDULE}
    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg"

    [side]
        side=1
        controller=ai
        team_name=a
        type=HAL_Archonte_Imperial
        x=1
        y=1
        canrecruit=yes
        gold=100
    [/side]
    [side]
        side=2
        controller=ai
        team_name=b
        type=Orcish Grunt
        x=5
        y=3
        canrecruit=yes
        gold=0
    [/side]

    [event]
        name=start
        # On crée puis détruit une unité pour confirmer l'instanciation, puis on gagne.
        [unit]
            type=HAL_Heritier_Arcanique
            side=1
            x=2
            y=2
        [/unit]
        [harm_unit]
            [filter]
                side=2
            [/filter]
            amount=9999
            kill=yes
            animate=no
        [/harm_unit]
        [endlevel]
            result=victory
        [/endlevel]
    [/event]
[/test]

# ---------------------------------------------------------------------------
# Galerie visuelle : toutes les unités, étiquetées. Ne pas finir le tour.
[test]
    id=hal_showcase
    name= _ "Haute Lignée Arcane — Galerie"
    turns=-1
    victory_when_enemies_defeated=no

    [time]
        id=neutre
        name= _ "Neutre"
        lawful_bonus=0
        red=0
        green=0
        blue=0
    [/time]

    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg"

    [side]
        side=1
        controller=human
        team_name=joueur
        type=HAL_Archonte_Imperial
        id=hal_showcase_leader
        x=2
        y=9
        canrecruit=yes
        gold=0
        fog=no
        shroud=no
    [/side]
    [side]
        side=2
        controller=null
        team_name=vide
        gold=0
    [/side]

    [event]
        name=prestart
        # Colonne gauche : recrues / N1
        {HAL_SHOW (HAL_Heritier_Arcanique)   2 1}
        {HAL_SHOW (HAL_Garde_Azur)           2 2}
        {HAL_SHOW (HAL_Dame_Etoiles)         2 3}
        {HAL_SHOW (HAL_Adepte_Temporel)      2 4}
        {HAL_SHOW (HAL_Invocateur_Noble)     2 5}
        {HAL_SHOW (HAL_Inquisiteur_Sang_Pur) 2 6}
        {HAL_SHOW (HAL_Dragonmage_Sang)      2 7}
        {HAL_SHOW (HAL_Gardien_Astral)       2 8}
        # (2,9) = Archonte (meneur)

        # Colonne droite : avancements
        {HAL_SHOW (HAL_Noble_Arcaniste)      5 1}
        {HAL_SHOW (HAL_Egide_Royale)         5 2}
        {HAL_SHOW (HAL_Dame_Astrale)         5 3}
        {HAL_SHOW (HAL_Chronolord)           5 4}
        {HAL_SHOW (HAL_Grand_Conjurateur)    5 5}
        {HAL_SHOW (HAL_Grand_Inquisiteur)    5 6}
        {HAL_SHOW (HAL_Sage_Draconique)      5 7}
        {HAL_SHOW (HAL_Lame_Flottante)       5 8}

        # Troisième colonne : N3 restants + esprit
        {HAL_SHOW (HAL_Prince_Mage)          7 1}
        {HAL_SHOW (HAL_Duchesse_Celeste)     7 3}
        {HAL_SHOW (HAL_Esprit_Noble)         7 8}

        [label]
            x=2
            y=9
            text= _ "Archonte Impérial"
        [/label]
        [print]
            text= _ "Galerie Haute Lignée Arcane — survolez / clic-droit > Description. Ne finissez pas le tour."
            size=16
            duration=900
        [/print]
    [/event]
[/test]
