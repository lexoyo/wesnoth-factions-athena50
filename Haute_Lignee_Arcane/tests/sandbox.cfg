#textdomain wesnoth-Haute_Lignee_Arcane
# Bac à sable jouable : toutes les unités de la Haute Lignée côté joueur (déplaçables,
# attaque possible, invocation active), un camp ennemi varié à affronter.
# Lancer : wesnoth -t hal_sandbox --data-dir <racine_wesnoth>
# - Déplace / attaque librement (ne finis pas le tour pour juste tester).
# - Finis le tour -> l'IA ennemie joue (vrai combat).
# - Meneur Archonte sur le donjon : recrute aussi n'importe quelle recrue.
# - Invocateur Noble : clic droit sur une case libre adjacente -> serviteur astral.

#define HAL_PLACE TYPE X Y
    [unit]
        type={TYPE}
        side=1
        x={X}
        y={Y}
    [/unit]
#enddef

#define HAL_PLACE_SIDE TYPE X Y SIDE
    [unit]
        type={TYPE}
        side={SIDE}
        x={X}
        y={Y}
    [/unit]
#enddef

[test]
    id=hal_sandbox
    name= _ "Haute Lignée Arcane — Bac à sable"
    turns=-1

    [time]
        id=neutre
        name= _ "Neutre"
        lawful_bonus=0
        red=0
        green=0
        blue=0
    [/time]

    # Invocation active dans le bac à sable.
    {HAL_SUMMON_EVENTS}

    map_data="usage=map
border_size=1

Gg, Gg, Gg, Gg, Gg, Gg^Ft, Hh, Mm, Mm, Hh, Gg^Ft, Gg, Gg, Gg, Gg, Gg
Gg, Ch, Ch, Gg, Gg, Gg^Ft, Hh, Mm, Hh, Gg, Gg, Ds, Ds, Ch, Ch, Gg
Gg, Ch, Gg, Gg, Gg, Gg^Ft, Hh, Ww, Ww, Gg, Gg^Vh, Ds, Gg, Gg, Ch, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg^Ft, Ww, Ww, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, 1 Kh, Ch, Gg, Gg, Gg, Gg^Ft, Ww, Ww, Gg, Ss, Gg, Gg, Ch, 2 Kh, Gg
Gg, Ch, Ch, Gg, Gg^Vh, Gg, Gg, Ww, Ww, Gg, Ss, Gg, Gg^Vh, Ch, Ch, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Ww, Ww, Gg, Gg, Gg, Gg, Gg, Gg, Gg
Gg, Gg, Hh, Gg, Gg, Gg^Ft, Gg^Ft, Ww, Gg, Gg, Hh, Gg, Gg, Gg, Gg, Gg
Gg, Hh, Hh, Mm, Gg, Gg, Hh, Hh, Mm, Mm, Hh, Gg, Aa, Aa, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Hh, Mm, Gg, Gg, Aa, Gg, Gg, Gg
Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg, Gg"

    [side]
        side=1
        controller=human
        team_name=joueur
        user_team_name= _ "Haute Lignée Arcane"
        type=HAL_Archonte_Imperial
        id=hal_sandbox_leader
        x=2
        y=5
        canrecruit=yes
        gold=400
        fog=no
        shroud=no
        recruit="HAL_Heritier_Arcanique,HAL_Garde_Azur,HAL_Dame_Etoiles,HAL_Adepte_Temporel,HAL_Invocateur_Noble,HAL_Dragonmage_Sang,HAL_Inquisiteur_Sang_Pur"
    [/side]

    [side]
        side=2
        controller=ai
        team_name=ennemi
        user_team_name= _ "Cibles d'entraînement"
        type=Orcish Warlord
        id=hal_enemy_leader
        x=15
        y=5
        canrecruit=yes
        gold=200
        fog=no
        shroud=no
    [/side]

    [event]
        name=prestart

        # ---- Côté joueur : toutes les unités de la faction ----
        {HAL_PLACE (HAL_Heritier_Arcanique)   1 1}
        {HAL_PLACE (HAL_Noble_Arcaniste)      3 1}
        {HAL_PLACE (HAL_Prince_Mage)          4 1}
        {HAL_PLACE (HAL_Garde_Azur)           5 1}
        {HAL_PLACE (HAL_Egide_Royale)         1 2}
        {HAL_PLACE (HAL_Dame_Etoiles)         4 2}
        {HAL_PLACE (HAL_Dame_Astrale)         5 2}
        {HAL_PLACE (HAL_Duchesse_Celeste)     1 3}
        {HAL_PLACE (HAL_Adepte_Temporel)      3 3}
        {HAL_PLACE (HAL_Chronolord)           4 3}
        {HAL_PLACE (HAL_Invocateur_Noble)     5 3}
        {HAL_PLACE (HAL_Grand_Conjurateur)    1 4}
        {HAL_PLACE (HAL_Inquisiteur_Sang_Pur) 2 4}
        {HAL_PLACE (HAL_Grand_Inquisiteur)    3 4}
        {HAL_PLACE (HAL_Dragonmage_Sang)      4 4}
        {HAL_PLACE (HAL_Sage_Draconique)      5 4}
        # (2,5) = Archonte (meneur), placé par [side].

        # ---- Côté ennemi : cibles variées (races différentes) ----
        {HAL_PLACE_SIDE (Orcish Grunt)        12 4 2}
        {HAL_PLACE_SIDE (Orcish Grunt)        13 4 2}
        {HAL_PLACE_SIDE (Skeleton)            11 5 2}
        {HAL_PLACE_SIDE (Elvish Archer)       13 6 2}
        {HAL_PLACE_SIDE (Wose)                10 7 2}
        {HAL_PLACE_SIDE (Mage)                13 7 2}
        {HAL_PLACE_SIDE (Heavy Infantryman)   12 6 2}
        {HAL_PLACE_SIDE (Troll Whelp)         12 3 2}

        [print]
            text= _ "Bac à sable Haute Lignée : déplace/attaque librement. Finis le tour pour l'IA. Invocateur = clic droit sur case libre adjacente."
            size=15
            duration=900
        [/print]
    [/event]
[/test]
