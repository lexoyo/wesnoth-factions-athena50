#textdomain wesnoth-Haute_Lignee_Arcane
# Serviteurs astraux TEMPORAIRES (invoqués par l'Invocateur Noble / Grand Conjurateur).
# Faibles, non recrutables, masqués de l'aide ; disparaissent après ~2 tours (cf. summon.cfg).
# TODO ART: images/units/high-arcane-lineage/gardien-astral.png, lame-flottante.png, esprit-noble.png

# --- Gardien Astral : petit bloqueur ---
[unit_type]
    id=HAL_Gardien_Astral
    name= _ "Gardien Astral"
    race=highborn_arcane
    image="units/high-arcane-lineage/gardien-astral.png"
    hitpoints=24
    movement_type=hal_noble
    movement=5
    experience=99
    level=0
    alignment=lawful
    advances_to=null
    cost=1
    usage=fighter
    num_traits=0
    do_not_list=yes
    hide_help=yes
    description= _ "Serviteur astral temporaire conjuré par la Lignée. Faible mais utile pour bloquer un passage."
    [attack]
        name=lame_astrale
        description= _ "Lame astrale"
        icon=attacks/sword-flaming.png
        type=arcane
        range=melee
        damage=6
        number=2
    [/attack]
    {HAL_ANIMS units/high-arcane-lineage/gardien-astral.png sword-1.ogg}
[/unit_type]

# --- Lame Flottante : petit attaquant de mêlée ---
[unit_type]
    id=HAL_Lame_Flottante
    name= _ "Lame Flottante"
    race=highborn_arcane
    image="units/high-arcane-lineage/lame-flottante.png"
    hitpoints=16
    movement_type=hal_noble
    movement=6
    experience=99
    level=0
    alignment=lawful
    advances_to=null
    cost=1
    usage=fighter
    num_traits=0
    do_not_list=yes
    hide_help=yes
    description= _ "Lame enchantée flottante, conjurée pour harceler l’ennemi. Disparaît vite."
    [attack]
        name=taillade_astrale
        description= _ "Taillade astrale"
        icon=attacks/sword-human.png
        type=blade
        range=melee
        damage=7
        number=2
    [/attack]
    {HAL_ANIMS units/high-arcane-lineage/lame-flottante.png sword-1.ogg}
[/unit_type]

# --- Esprit Noble : petit lanceur à distance ---
[unit_type]
    id=HAL_Esprit_Noble
    name= _ "Esprit Noble"
    race=highborn_arcane
    image="units/high-arcane-lineage/esprit-noble.png"
    hitpoints=14
    movement_type=hal_noble
    movement=6
    experience=99
    level=0
    alignment=lawful
    advances_to=null
    cost=1
    usage=mixed fighter
    num_traits=0
    do_not_list=yes
    hide_help=yes
    description= _ "Esprit d’un ancêtre noble, rappelé brièvement pour lancer un éclat arcanique."
    [attack]
        name=eclat_arcanique
        description= _ "Éclat arcanique"
        icon=attacks/faerie-fire.png
        type=arcane
        range=ranged
        damage=6
        number=2
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]
    {HAL_ANIMS units/high-arcane-lineage/esprit-noble.png sword-1.ogg}
[/unit_type]
