#textdomain wesnoth-Haute_Lignee_Arcane
# Race custom de la faction. À inclure DANS [units] (cf. _main.cfg).
# Pool de traits standard (élite) ; chaque unité en tire 2 au hasard.
[race]
    id=highborn_arcane
    name= _ "Noble Arcane"
    plural_name= _ "Nobles Arcanes"
    description= _ "Anciennes lignées nobles formées à la magie impériale. Rares, fières et redoutables, elles mènent la guerre comme un duel de cour."
    num_traits=2
    {TRAIT_INTELLIGENT}
    {TRAIT_QUICK}
    {TRAIT_RESILIENT}
    {TRAIT_STRONG}
    # TODO (optionnel, si voulu plus tard) : traits custom de lignée
    #   - "Sang Noble" : +10% résistance arcane  (via [trait][effect]apply_to=resistance)
    #   - "Éducation Impériale" : +1 dégât magique à distance (via [effect]apply_to=attack)
    # Laissés en TODO pour rester stable ; la résistance arcane d'élite est déjà
    # intégrée dans les types de déplacement (movetypes.cfg).
[/race]
