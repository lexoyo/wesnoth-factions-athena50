#textdomain wesnoth-Haute_Lignee_Arcane
# Capacités custom de la Haute Lignée Arcane. Définies en macros, incluses AVANT [units].

# --- Égide royale : aura de protection magique ---
# Soi-même + alliés adjacents : +20% de résistance au feu, au froid et à l'arcane.
# (Modèle éprouvé : ability [resistance] add=20 = +20 points de résistance.)
#define ABILITY_HAL_AEGIS
    [resistance]
        id=hal_aegis
        add=20
        apply_to=fire,cold,arcane
        affect_self=yes
        affect_allies=yes
        name= _ "égide royale"
        female_name= _ "égide royale"
        description= _ "Égide royale : cette unité et les unités alliées adjacentes gagnent +20 % de résistance au feu, au froid et à l’arcane."
        [affect_adjacent]
        [/affect_adjacent]
    [/resistance]
#enddef

# --- Châtiment : bonus de dégâts contre les morts-vivants (anti-mort-vivant) ---
# Special d'arme : +50% de dégâts quand la cible est de race morte-vivante.
#define WEAPON_SPECIAL_HAL_PURGE
    [damage]
        id=hal_purge
        name= _ "châtiment"
        description= _ "Châtiment : cette attaque inflige 50 % de dégâts supplémentaires contre les morts-vivants."
        multiply=1.5
        active_on=offense
        [filter_opponent]
            race=undead
        [/filter_opponent]
    [/damage]
#enddef
