#textdomain wesnoth-Haute_Lignee_Arcane
# ============================================================================
#  INVOCATION NOBLE — mécanique signature des invocateurs.
#  L'Invocateur Noble (et le Grand Conjurateur) peuvent appeler un serviteur
#  astral TEMPORAIRE sur une case vide adjacente, via un menu clic-droit.
#  - Le serviteur est faible et disparaît après ~2 tours.
#  - Invoquer consomme le tour de l'invocateur (plus de déplacement/attaque).
#  100 % WML natif (events + set_menu_item). À inclure dans chaque [era].
# ============================================================================

# Crée un serviteur sur la case cliquée, marqué avec son tour d'expiration.
#define HAL_DO_SUMMON TYPE
    [unit]
        type={TYPE}
        side=$side_number
        x=$x1
        y=$y1
        generate_name=yes
        animate=yes
        [variables]
            hal_expire=$hal_exp
        [/variables]
    [/unit]
#enddef

#define HAL_SUMMON_EVENTS
    # --- Enregistre l'objet de menu clic-droit au démarrage ---
    [event]
        name=prestart
        [set_menu_item]
            id=hal_summon
            description= _ "Invoquer un serviteur astral"
            image="units/undead-spirit/spectre.png"
            [show_if]
                # Un invocateur à toi, adjacent à la case cliquée, avec des PM.
                [have_unit]
                    side=$side_number
                    type=HAL_Invocateur_Noble,HAL_Grand_Conjurateur
                    formula="moves > 0"
                    [filter_location]
                        [filter_adjacent_location]
                            x=$x1
                            y=$y1
                        [/filter_adjacent_location]
                    [/filter_location]
                [/have_unit]
                # ...et la case cliquée est libre.
                [not]
                    [have_unit]
                        x=$x1
                        y=$y1
                    [/have_unit]
                [/not]
            [/show_if]
            [command]
                [store_unit]
                    [filter]
                        side=$side_number
                        type=HAL_Invocateur_Noble,HAL_Grand_Conjurateur
                        formula="moves > 0"
                        [filter_location]
                            [filter_adjacent_location]
                                x=$x1
                                y=$y1
                            [/filter_adjacent_location]
                        [/filter_location]
                    [/filter]
                    variable=hal_caster
                    kill=no
                [/store_unit]
                [if]
                    [variable]
                        name=hal_caster.length
                        greater_than=0
                    [/variable]
                    [then]
                        # Échéance = tour courant + 2.
                        [set_variable]
                            name=hal_exp
                            value=$turn_number
                        [/set_variable]
                        [set_variable]
                            name=hal_exp
                            add=2
                        [/set_variable]
                        # Tirer un serviteur au hasard.
                        [set_variable]
                            name=hal_pick
                            rand=1,2,3
                        [/set_variable]
                        [if]
                            [variable]
                                name=hal_pick
                                numerical_equals=1
                            [/variable]
                            [then]
                                {HAL_DO_SUMMON (HAL_Gardien_Astral)}
                            [/then]
                        [/if]
                        [if]
                            [variable]
                                name=hal_pick
                                numerical_equals=2
                            [/variable]
                            [then]
                                {HAL_DO_SUMMON (HAL_Lame_Flottante)}
                            [/then]
                        [/if]
                        [if]
                            [variable]
                                name=hal_pick
                                numerical_equals=3
                            [/variable]
                            [then]
                                {HAL_DO_SUMMON (HAL_Esprit_Noble)}
                            [/then]
                        [/if]
                        # Invoquer consomme le tour de l'invocateur.
                        [modify_unit]
                            [filter]
                                x=$hal_caster[0].x
                                y=$hal_caster[0].y
                            [/filter]
                            moves=0
                            attacks_left=0
                        [/modify_unit]
                        [clear_variable]
                            name=hal_exp,hal_pick
                        [/clear_variable]
                    [/then]
                [/if]
                [clear_variable]
                    name=hal_caster
                [/clear_variable]
            [/command]
        [/set_menu_item]
    [/event]

    # --- Expiration : retirer les serviteurs dont l'échéance est atteinte ---
    [event]
        name=side turn
        first_time_only=no
        [store_unit]
            [filter]
                type=HAL_Gardien_Astral,HAL_Lame_Flottante,HAL_Esprit_Noble
            [/filter]
            variable=hal_summons
            kill=no
        [/store_unit]
        [foreach]
            array=hal_summons
            [do]
                [if]
                    [variable]
                        name=this_item.variables.hal_expire
                        less_than_equal_to=$turn_number
                    [/variable]
                    [then]
                        [kill]
                            x=$this_item.x
                            y=$this_item.y
                            animate=yes
                            fire_event=no
                        [/kill]
                    [/then]
                [/if]
            [/do]
        [/foreach]
        [clear_variable]
            name=hal_summons
        [/clear_variable]
    [/event]
#enddef
