#textdomain wesnoth-Haute_Lignee_Arcane
# Animations "placeholder fonctionnel" — dérivées de l'UNIQUE sprite de chaque unité
# (déplacement interpolé + teinte ~CS + projectiles core), donc aucune frame dessinée
# requise et rien ne casse si l'art custom manque.
#
# TODO ART : remplacer par de vraies frames dans
#   images/units/high-arcane-lineage/<id>-attack-*.png, -ranged-*.png, -defend.png, -death-*.png
# (timings conseillés : attaque 75-150 ms, défense 75-100 ms, mort 100-150 ms).
#
# Variantes à distance par TYPE de dégât (le moteur choisit la plus spécifique) :
#   arcane -> faerie-fire | fire -> brasier | cold -> glace | autre -> projectile magique.
# Appliquer à une unité : {HAL_ANIMS <chemin_image> <son_melee>}

# --- Mêlée : pas en avant + flash d'impact ---
#define HAL_MELEE IMG SOUND
    [attack_anim]
        [filter_attack]
            range=melee
        [/filter_attack]
        start_time=-250
        [frame]
            image="{IMG}"
            duration=180
            offset="0.0~0.35"
        [/frame]
        [frame]
            image="{IMG}~CS(40,30,55)"
            duration=120
            offset=0.35
            sound={SOUND}
        [/frame]
        [frame]
            image="{IMG}"
            duration=180
            offset="0.35~0.0"
        [/frame]
    [/attack_anim]
#enddef

# --- À distance, arcane : éclat de fée violet ---
#define HAL_RANGED_ARCANE IMG
    [attack_anim]
        [filter_attack]
            range=ranged
            type=arcane
        [/filter_attack]
        {MISSILE_FRAME_FAERIE_FIRE}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(35,25,65)"
            duration=150
            sound=magic-faeriefire.ogg
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# --- À distance, feu : brasier ---
#define HAL_RANGED_FIRE IMG
    [attack_anim]
        [filter_attack]
            range=ranged
            type=fire
        [/filter_attack]
        {FIRE_BURST_SMALL}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(60,40,20)"
            duration=150
            sound=flame-big.ogg
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# --- À distance, froid : éclat de glace ---
#define HAL_RANGED_COLD IMG
    [attack_anim]
        [filter_attack]
            range=ranged
            type=cold
        [/filter_attack]
        {MISSILE_FRAME_ICE}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(25,35,70)"
            duration=150
            sound=magic-faeriefire.ogg
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# --- À distance, fallback (impact/foudre/etc.) : projectile magique ---
#define HAL_RANGED_GENERIC IMG
    [attack_anim]
        [filter_attack]
            range=ranged
        [/filter_attack]
        {MAGIC_MISSILE 0 0}
        start_time=-150
        [frame]
            image="{IMG}"
            duration=150
        [/frame]
        [frame]
            image="{IMG}~CS(30,30,60)"
            duration=150
            sound=magic-faeriefire.ogg
        [/frame]
        [frame]
            image="{IMG}"
            duration=200
        [/frame]
    [/attack_anim]
#enddef

# --- Défense : voile / flinch ---
#define HAL_DEFEND IMG
    [defend]
        start_time=-100
        [if]
            hits=yes
            [frame]
                image="{IMG}~CS(-35,-25,10)"
                duration=250
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                image="{IMG}"
                duration=200
            [/frame]
        [/else]
    [/defend]
#enddef

# --- Idle : pulsation de sigil (lueur arcane douce) ---
#define HAL_IDLE IMG
    [idle_anim]
        {STANDARD_IDLE_FILTER}
        start_time=0
        [frame]
            image="{IMG}"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(20,15,40)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(35,25,65)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}~CS(20,15,40)"
            duration=300
        [/frame]
        [frame]
            image="{IMG}"
            duration=300
        [/frame]
    [/idle_anim]
#enddef

# --- Bundle complet à coller dans un [unit_type] ---
#define HAL_ANIMS IMG MELEE_SOUND
    {HAL_MELEE {IMG} {MELEE_SOUND}}
    {HAL_RANGED_ARCANE {IMG}}
    {HAL_RANGED_FIRE {IMG}}
    {HAL_RANGED_COLD {IMG}}
    {HAL_RANGED_GENERIC {IMG}}
    {HAL_DEFEND {IMG}}
    {HAL_IDLE {IMG}}
#enddef
