#textdomain wesnoth-Haute_Lignee_Arcane
# La Haute Lignée Arcane — point d'entrée de l'add-on (type ère).
# Faction élitiste : mages nobles de lignées impériales. Peu d'unités, très chères,
# très puissantes. Forte magie/burst, faible contrôle de villages, fragile au nombre.

[textdomain]
    name="wesnoth-Haute_Lignee_Arcane"
[/textdomain]

# Permet à image="units/high-arcane-lineage/..." de pointer dans cet add-on.
[binary_path]
    path=data/add-ons/Haute_Lignee_Arcane
[/binary_path]

# 1) Définitions de macros (capacités custom + animations + invocation) — AVANT usage.
{~add-ons/Haute_Lignee_Arcane/utils/abilities.cfg}
{~add-ons/Haute_Lignee_Arcane/utils/animations.cfg}
{~add-ons/Haute_Lignee_Arcane/utils/summon.cfg}

# 2) Race + types de déplacement + unités. Chargés toujours (nécessaire pour -u).
[units]
    {~add-ons/Haute_Lignee_Arcane/utils/race.cfg}
    {~add-ons/Haute_Lignee_Arcane/utils/movetypes.cfg}
    {~add-ons/Haute_Lignee_Arcane/units/}
[/units]

# 3) Ères (multijoueur uniquement).
#ifdef MULTIPLAYER
{~add-ons/Haute_Lignee_Arcane/eras.cfg}
#endif

# 4) Scénarios de test (mode -u / -t).
{~add-ons/Haute_Lignee_Arcane/tests/}
